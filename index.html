<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculator Pro</title>
  <style>
    *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,#2b3f72,transparent 45%),radial-gradient(circle at 90% 90%,#233f54,transparent 40%),#0b1220;color:#fff}
    .card{width:min(92vw,360px);background:rgba(18,28,48,.85);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:16px;backdrop-filter: blur(8px);box-shadow:0 20px 40px rgba(0,0,0,.35)}
    .title{font-weight:700;letter-spacing:.5px;margin-bottom:10px;color:#c7dcff}
    .display{width:100%;height:72px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:#091223;color:#fff;text-align:right;padding:10px 12px;font-size:32px;overflow:hidden}
    .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
    button{height:56px;border:0;border-radius:12px;font-size:20px;font-weight:700;cursor:pointer;color:#fff;background:#1e2f4d}
    button:hover{filter:brightness(1.08)}
    .op{background:#2a4a74}
    .eq{background:#2b9f6a}
    .ac{background:#8a3546}
    .hint{margin-top:8px;color:#9fb6d8;font-size:12px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Calculator Pro</div>
    <input id="display" class="display" value="0" readonly />
    <div class="keys">
      <button class="ac" data-v="AC">AC</button>
      <button data-v="(">(</button>
      <button data-v=")">)</button>
      <button class="op" data-v="/">÷</button>

      <button data-v="7">7</button>
      <button data-v="8">8</button>
      <button data-v="9">9</button>
      <button class="op" data-v="*">×</button>

      <button data-v="4">4</button>
      <button data-v="5">5</button>
      <button data-v="6">6</button>
      <button class="op" data-v="-">−</button>

      <button data-v="1">1</button>
      <button data-v="2">2</button>
      <button data-v="3">3</button>
      <button class="op" data-v="+">＋</button>

      <button data-v="0" style="grid-column:span 2">0</button>
      <button data-v=".">.</button>
      <button class="eq" data-v="=">=</button>
    </div>
    <div class="hint">支持键盘输入（Enter=计算，Backspace=删除）</div>
  </div>

<script>
  const d = document.getElementById('display');
  let expr = '0';

  function render(){ d.value = expr; }
  function append(v){
    if(expr === '0' && /[0-9]/.test(v)) expr = v;
    else expr += v;
    render();
  }
  function calc(){
    try{
      const result = Function('return (' + expr + ')')();
      expr = String(Number.isFinite(result) ? result : 'Error');
    }catch{ expr = 'Error'; }
    render();
  }
  function back(){
    expr = expr.length > 1 ? expr.slice(0,-1) : '0';
    render();
  }

  document.querySelectorAll('button').forEach(b=>{
    b.onclick = () => {
      const v = b.dataset.v;
      if(v === 'AC'){ expr='0'; return render(); }
      if(v === '='){ return calc(); }
      append(v);
    };
  });

  window.addEventListener('keydown', (e)=>{
    if(/^[0-9]$/.test(e.key)) return append(e.key);
    if(['+','-','*','/','(',')','.'].includes(e.key)) return append(e.key);
    if(e.key === 'Enter') return calc();
    if(e.key === 'Backspace') return back();
    if(e.key.toLowerCase() === 'c') { expr='0'; render(); }
  });
</script>
</body>
</html>
